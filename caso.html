<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <base href="http://localhost/cambria_672642/"> -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/shop.css">
    <title>Document</title>
    <style>
        body{
            display: flex;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 0;
        }
        img{
            width: 200px;
            min-height: 300px;
            margin: 0;
            animation: ani 1.5s ease-in-out;
            
        }

        @keyframes ani {
            0% {
            width: 200px;
            height: 300px;
            transform: translate(0, 0);
            }
            25% {
            width: 150px;
            height: 300px;
            object-fit: fill;
            transform: translate(-20px, 0);
            }
            50% {
            /* width: 200px; */
            height: 300px;
            transform: translate(20px, 0);
            }
            75% {
            /* width: 180px; */
            height: 300px;
            transform: translate(-20px, 0);
            }
            100% {
            /* width: 200px; */
            height: 300px;
            transform: translate(0, 0);
            }
        }
    </style>
</head>
<body>
    <img src="./images/characters/acqua.svg" alt="pg">
</body>
</html>
