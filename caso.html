        <!--? Cambio Password -->
        <div class="password-page">
            <div class="menu-space header">
                <h2>Cambio Password</h2>
            </div>
            <div class="menu-space">
                <form class="password" action="php/API/fammi.php" method="POST">
                    <label>Nuova Password:</label>
                    <div class="password-container">
                        <input type="password" name="password" id="password" required="" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&amp;])[A-Za-z\d@$!%*?&amp;]{8,15}$" title="Deve contenere almeno 8 caratteri, una lettera maiuscola, una minuscola, un numero e un carattere speciale." placeholder="Password">
                        <button type="button" class="toggle-password">Mostra</button>
                    </div>
                    <label>Conferma Password:</label>
                    <div class="password-container">
                        <input type="text" name="confirmPassword" id="confirmPassword" required="" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&amp;])[A-Za-z\d@$!%*?&amp;]{8,15}$" title="Deve essere uguale alla password." placeholder="Conferma" class="invalid">
                        <button type="button" class="toggle-password">Mostra</button>
                    </div>
                    <button>Conferma</button>
                    <button>Annulla</button>
                </form>
            </div>
        </div>
    </div>
